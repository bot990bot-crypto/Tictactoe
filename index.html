    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #1a1a2e;
            --card: rgba(22, 33, 62, 0.6);
            --text: #ffffff;
            --accent: #e94560;
            --success: #00d9ff;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(-45deg, var(--bg), #0f172a, var(--primary), #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Theme Classes */
        .theme-default { --primary: #6c5ce7; --secondary: #a29bfe; --bg: #1a1a2e; --accent: #e94560; }
        .theme-ocean { --primary: #0077b6; --secondary: #00b4d8; --bg: #03045e; --accent: #90e0ef; }
        .theme-forest { --primary: #2d6a4f; --secondary: #40916c; --bg: #1b4332; --accent: #95d5b2; }
        .theme-sunset { --primary: #f77f00; --secondary: #fcbf49; --bg: #370617; --accent: #ffba08; }
        .theme-candy { --primary: #ff006e; --secondary: #fb5607; --bg: #3a0ca3; --accent: #f72585; }
        .theme-midnight { --primary: #4361ee; --secondary: #4895ef; --bg: #0d1b2a; --accent: #00f5d4; }
        .theme-retro { --primary: #ff595e; --secondary: #ffca3a; --bg: #1982c4; --accent: #8ac926; }
        .theme-neon { --primary: #ff00ff; --secondary: #00ffff; --bg: #0a0a0a; --accent: #39ff14; }

        .container {
            width: 100%;
            max-width: 550px;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 15px;
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        @media (min-width: 600px) {
            .container {
                min-height: 90vh;
                height: 90vh;
                border-radius: 20px;
                box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
                overflow-y: auto;
            }
            .container::-webkit-scrollbar { width: 6px; }
            .container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        }

        /* Main Menu */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.5s ease;
            flex: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { text-align: center; margin-bottom: 15px; margin-top: 10px; }
        .logo h1 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            background: linear-gradient(135deg, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            line-height: 1.2;
            letter-spacing: 1px;
        }
        .logo p { color: var(--accent); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        .menu-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .menu-section h3 {
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.9;
        }

        .menu-section h3::before {
            content: ''; width: 6px; height: 16px;
            background: var(--accent); border-radius: 3px;
        }

        .option-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .option-grid.two-col { grid-template-columns: repeat(2, 1fr); }
        .option-grid.three-col { grid-template-columns: repeat(3, 1fr); }

        .option-btn {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; padding: 12px 5px; color: var(--text);
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.75rem; text-align: center; font-weight: 600;
        }
        .option-btn.active { border-color: var(--accent); background: rgba(233, 69, 96, 0.25); box-shadow: 0 0 15px rgba(233, 69, 96, 0.3); }
        .option-btn .icon { font-size: 1.3rem; display: block; margin-bottom: 5px; }

        .theme-preview {
            width: 25px; height: 25px; border-radius: 50%;
            margin: 0 auto 5px; border: 2px solid rgba(255,255,255,0.3);
        }

        .play-btn {
            background: linear-gradient(45deg, var(--primary), var(--accent), var(--primary));
            background-size: 200% auto;
            border: none; border-radius: 15px; padding: 20px; color: white;
            font-size: 1.2rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            margin-top: 10px; margin-bottom: 20px;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .play-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px rgba(233, 69, 96, 0.6); }
        .play-btn:active { transform: translateY(1px); }

        /* Hover only for pointer devices */
        @media (hover: hover) {
            .menu-section:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.05); }
            .option-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
            .cell:hover:not(.taken):not(.blocked) { background: rgba(255,255,255,0.1); transform: scale(1.05); border-color: var(--secondary); }
            .symbol-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
            .control-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(233, 69, 96, 0.2); transform: translateY(-2px); }
            .modal-btns button:hover { transform: translateY(-2px) scale(1.05); }
            .back-btn:hover { background: var(--accent); }
        }

        /* Game Screen */
        .game-screen {
            display: none; flex-direction: column; gap: 15px;
            animation: fadeIn 0.4s ease; flex: 1;
        }

        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .back-btn {
            background: rgba(255,255,255,0.1); border: none; width: 40px; height: 40px;
            border-radius: 10px; color: var(--text); font-size: 1.2rem; cursor: pointer;
            transition: all 0.2s ease;
        }

        .turn-indicator { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; }
        .current-symbol {
            width: 35px; height: 35px; background: var(--primary); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            transition: background 0.3s ease; box-shadow: 0 0 10px var(--primary);
        }

        .timer-display {
            background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px;
            font-size: 1rem; font-weight: 600; min-width: 50px; text-align: center;
        }
        .timer-display.warning { background: var(--accent); animation: pulse 0.5s ease infinite; box-shadow: 0 0 10px var(--accent); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .scoreboard {
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.2);
            border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
        .score-item { text-align: center; }
        .score-item .label { font-size: 0.75rem; color: var(--secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .score-item .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); text-shadow: 0 0 10px rgba(233,69,96,0.5); }

        .game-board-container {
            display: flex; justify-content: center; align-items: center;
            flex: 1; min-height: 350px;
        }

        .game-board {
            display: grid; gap: 8px; background: rgba(0,0,0,0.3); padding: 15px;
            border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            width: min(100%, 400px);
            height: min(100%, 400px);
            aspect-ratio: 1;
            max-width: min(80vw, 80vh, 400px);
            max-height: min(80vw, 80vh, 400px);
            touch-action: manipulation;
        }

        .cell {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%; height: 100%; box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .cell.taken { cursor: not-allowed; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .cell.blocked { background: rgba(0,0,0,0.6); cursor: not-allowed; position: relative; }
        .cell.blocked::after { content: '🚫'; font-size: 1.5rem; opacity: 0.4; }

        /* Game Over Visibility Styles */
        .cell.winning {
            animation: winPulse 0.5s ease infinite;
            background: rgba(233, 69, 96, 0.4);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent), inset 0 0 20px var(--accent);
            z-index: 2;
        }
        .cell.faded {
            opacity: 0.2;
            transform: scale(0.9);
            filter: grayscale(100%);
        }

        @keyframes winPulse { 0%, 100% { transform: scale(1.05); } 50% { transform: scale(1.15); } }
        .cell.pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .game-controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px;}
        .control-btn {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px 20px; color: var(--text);
            cursor: pointer; transition: all 0.3s ease; display: flex;
            align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600;
        }
        .control-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 3D Board */
        .board-3d-container {
            width: 100%; height: 100%; min-height: 350px;
            border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.3);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            position: relative; border: 1px solid rgba(255,255,255,0.05);
            touch-action: none;
        }
        .board-3d-container canvas { outline: none; display: block; touch-action: none; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            display: none; align-items: flex-start;
            justify-content: center; z-index: 1000; animation: fadeIn 0.3s ease;
            padding-top: 8vh;
        }
        .modal {
            background: rgba(26, 26, 46, 0.95); border-radius: 20px; padding: 25px;
            text-align: center; max-width: 320px; width: 90%;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px var(--accent);
            backdrop-filter: blur(10px);
        }
        .modal h2 { font-size: 1.8rem; margin-bottom: 5px; color: var(--accent); text-shadow: 0 0 10px rgba(233,69,96,0.5); }
        .modal .winner-symbol { font-size: 3.5rem; margin: 15px 0; animation: bounce 1s ease infinite; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 1rem;
        }
        .modal-btns .primary-btn { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; box-shadow: 0 5px 15px rgba(233,69,96,0.3); }
        .modal-btns .secondary-btn { background: rgba(255,255,255,0.1); color: var(--text); }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .symbol-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .symbol-btn {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; padding: 10px; font-size: 1.5rem;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .symbol-btn.active { border-color: var(--accent); background: rgba(233, 69, 96, 0.25); transform: scale(1.1); box-shadow: 0 0 15px rgba(233, 69, 96, 0.3); }

        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000;
            transition: opacity 0.3s ease;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toggle-container {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .toggle {
            width: 50px; height: 26px; background: rgba(255,255,255,0.2);
            border-radius: 13px; position: relative; cursor: pointer; transition: all 0.3s ease;
        }
        .toggle.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .toggle::after {
            content: ''; position: absolute; width: 22px; height: 22px;
            background: white; border-radius: 50%; top: 2px; left: 2px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .toggle.active::after { left: 26px; }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .option-grid { grid-template-columns: repeat(3, 1fr); }
            .option-grid.two-col { grid-template-columns: repeat(2, 1fr); }
            .symbol-btn { font-size: 1.2rem; padding: 8px; }
        }
    </style>
</head>
<body class="theme-default">
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="container">
        <div class="main-menu" id="mainMenu">
            <div class="logo">
                <h1>🎮 Tic Tac Toe</h1>
                <p>Ultimate Edition</p>
            </div>

            <div class="menu-section">
                <h3>Game Mode</h3>
                <div class="option-grid two-col">
                    <button class="option-btn" data-mode="pvp">
                        <span class="icon">👥</span> 2 Players
                    </button>
                    <button class="option-btn" data-mode="ai">

            <div class="menu-section hidden" id="aiDifficulty">

                <div class="option-grid three-col">
                    <button class="option-btn" data-difficulty="easy"><span class="icon">😊</span> Easy</button>

                    <button class="option-btn" data-difficulty="unbeatable"><span class="icon">🧠</span> Hard</button>

            </div>

            <div class="menu-section">
                <h3>Grid Size</h3>

                    <button class="option-btn" data-grid="3"><span class="icon">▦</span> 3×3</button>

                    <button class="option-btn" data-grid="6"><span class="icon">▦</span> 6×6</button>

            <div class="menu-section">

            <div class="menu-section">
                <h3>Player Symbols</h3>

                    <button class="symbol-btn" data-symbol="🔥">🔥</button>
                    <button class="symbol-btn" data-symbol="💎">💎</button>
                    <button class="symbol-btn" data-symbol="🎯">🎯</button>
                    <button class="symbol-btn" data-symbol="🚀">🚀</button>
                    <button class="symbol-btn" data-symbol="🌟">🌟</button>
                    <button class="symbol-btn" data-symbol="👑">👑</button>

                <div class="symbol-grid" id="p2Symbols">
                    <button class="symbol-btn" data-symbol="⭕">⭕</button>

                    <button class="symbol-btn" data-symbol="🍊">🍊</button>
                    <button class="symbol-btn" data-symbol="🌙">🌙</button>

                    <button class="symbol-btn" data-symbol="🎪">🎪</button>

                    <button class="symbol-btn" data-symbol="🎭">🎭</button>
                </div>
            </div>

            <div class="menu-section">
                <h3>Themes</h3>
                <div class="option-grid">
                    <button class="option-btn" data-theme="default"><div class="theme-preview" style="background: linear-gradient(135deg, #6c5ce7, #e94560);"></div>Default</button>
                    <button class="option-btn" data-theme="ocean"><div class="theme-preview" style="background: linear-gradient(135deg, #0077b6, #90e0ef);"></div>Ocean</button>
                    <button class="option-btn" data-theme="forest"><div class="theme-preview" style="background: linear-gradient(135deg, #2d6a4f, #95d5b2);"></div>Forest</button>

                    <button class="option-btn" data-theme="candy"><div class="theme-preview" style="background: linear-gradient(135deg, #ff006e, #f72585);"></div>Candy</button>
                    <button class="option-btn" data-theme="midnight"><div class="theme-preview" style="background: linear-gradient(135deg, #4361ee, #00f5d4);"></div>Midnight</button>
                    <button class="option-btn" data-theme="retro"><div class="theme-preview" style="background: linear-gradient(135deg, #ff595e, #8ac926);"></div>Retro</button>

            </div>

            <div class="menu-section">
                <h3>Turn Timer</h3>

    <script>
        // Data Storage Handlers with try-catch (Fix #16)
        const StorageHandler = {
            saveSettings(state) {
                try {
                    const settings = {
                        mode: state.mode, difficulty: state.difficulty, gridSize: state.gridSize,
                        boardStyle: state.boardStyle, theme: state.theme, timer: state.timer,
                        soundEnabled: state.soundEnabled, bgmEnabled: state.bgmEnabled,
                        vibrationEnabled: state.vibrationEnabled, blockedCells: state.blockedCells,
                        player1Symbol: state.player1Symbol, player2Symbol: state.player2Symbol
                    };
                    localStorage.setItem('ttt_settings_v2', JSON.stringify(settings));
                } catch (e) {
                    console.warn('Could not save settings:', e);
                }
            },
            loadSettings() {
                try {
                    const data = localStorage.getItem('ttt_settings_v2');
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    return null;
                }
            },
            saveScores(scores) {
                try {
                    localStorage.setItem('ttt_scores_v2', JSON.stringify(scores));
                } catch (e) {
                    console.warn('Could not save scores:', e);
                }
            },
            loadScores() {
                try {
                    const data = localStorage.getItem('ttt_scores_v2');
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    return null;
                }
            }
        };

        // Enhanced Sound System (Fix #2 - BGM audio routing)
        class SoundSystem {
            constructor() {
                this.enabled = true;
                this.bgmEnabled = true;
                this.audioContext = null;
                this.initialized = false;
                this.bgmNodes = [];
                this.bgmGain = null;
            }

            init() {
                if (this.initialized) return;
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (AudioCtx) {
                    this.audioContext = new AudioCtx();
                    if (this.audioContext.state === 'suspended') {
                        this.audioContext.resume();
                    }
                    this.initialized = true;
                    if (this.bgmEnabled) this.startBGM();
                }
            }

            startBGM() {
                if (!this.audioContext || this.bgmNodes.length > 0) return;

                this.bgmGain = this.audioContext.createGain();
                this.bgmGain.gain.value = 0.03;
                this.bgmGain.connect(this.audioContext.destination);

                const frequencies = [130.81, 164.81, 196.00, 246.94];

                frequencies.forEach((freq, i) => {
                    const osc = this.audioContext.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = freq;

                    const lfo = this.audioContext.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.12 + (i * 0.03);

                    const lfoGain = this.audioContext.createGain();
                    lfoGain.gain.value = 0.015;

                    osc.connect(lfoGain);
                    lfo.connect(lfoGain.gain);
                    lfoGain.connect(this.bgmGain);

                    osc.start();
                    lfo.start();
                    this.bgmNodes.push(osc, lfo);
                });
            }

            stopBGM() {
                this.bgmNodes.forEach(node => {
                    try { node.stop(); } catch (e) {}
                });
                this.bgmNodes = [];
            }

            play(type) {
                if (!this.enabled || !this.audioContext) return;
                if (this.audioContext.state === 'suspended') this.audioContext.resume();

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                const now = this.audioContext.currentTime;

                switch (type) {
                    case 'move':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(600, now);
                        oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                        gainNode.gain.setValueAtTime(0.2, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        oscillator.start(now); oscillator.stop(now + 0.1);
                        break;
                    case 'win':
                        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                            const osc = this.audioContext.createOscillator();
                            const gain = this.audioContext.createGain();
                            osc.connect(gain); gain.connect(this.audioContext.destination);
                            osc.type = 'triangle'; osc.frequency.value = freq;
                            gain.gain.setValueAtTime(0.2, now + i * 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.3);
                            osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.3);
                        });
                        break;
                    case 'lose':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(300, now);
                        oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.4);
                        gainNode.gain.setValueAtTime(0.2, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                        oscillator.start(now); oscillator.stop(now + 0.4);
                        break;
                    case 'draw':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(350, now);
                        gainNode.gain.setValueAtTime(0.1, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                        oscillator.start(now); oscillator.stop(now + 0.4);
                        break;
                    case 'click':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(1200, now);
                        gainNode.gain.setValueAtTime(0.05, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                        oscillator.start(now); oscillator.stop(now + 0.05);
                        break;
                    case 'timer':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(880, now);
                        gainNode.gain.setValueAtTime(0.05, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        oscillator.start(now); oscillator.stop(now + 0.1);
                        break;
                }
            }
        }

        // Global State
        const state = {
            mode: 'pvp', difficulty: 'easy', gridSize: 3, boardStyle: '2d',
            player1Symbol: '❌', player2Symbol: '⭕', theme: 'default',
            timer: 0, soundEnabled: true, bgmEnabled: true, vibrationEnabled: true, blockedCells: false,
            currentPlayer: 1, board: [], blocked: [], moveHistory: [],
            scores: { p1: 0, p2: 0, draw: 0 },
            gameOver: false, timerInterval: null, timeLeft: 0
        };

        // DOM Elements Map
        const elements = {
            loading: document.getElementById('loading'),
            mainMenu: document.getElementById('mainMenu'), gameScreen: document.getElementById('gameScreen'),
            aiDifficulty: document.getElementById('aiDifficulty'), gameBoard: document.getElementById('gameBoard'),
            board3D: document.getElementById('board3D'), currentSymbol: document.getElementById('currentSymbol'),
            timerDisplay: document.getElementById('timerDisplay'), resultModal: document.getElementById('resultModal'),
            resultTitle: document.getElementById('resultTitle'), resultText: document.getElementById('resultText'),
            winnerSymbol: document.getElementById('winnerSymbol'), p1Score: document.getElementById('p1Score'),
            p2Score: document.getElementById('p2Score'), drawScore: document.getElementById('drawScore'),
            p1Label: document.getElementById('p1Label'), p2Label: document.getElementById('p2Label'),
            undoBtn: document.getElementById('undoBtn'), resetScoresBtn: document.getElementById('resetScoresBtn'),
            soundToggle: document.getElementById('soundToggle'), bgmToggle: document.getElementById('bgmToggle'),
            vibrationToggle: document.getElementById('vibrationToggle'),
            blockedToggle: document.getElementById('blockedToggle')
        };

        const sound = new SoundSystem();
        let scene, camera, renderer, boardMesh, cells3D = [];
        let canvasResizeObserver;
        let animationFrameId = null; // Fix #14
        let gridObjects = []; // Fix #15

        // Application Initialization
        function init() {
            // Telegram Mini App Initialization
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }

            loadPersistedData();
            setupEventListeners();
            applyTheme(state.theme);
            updateScoreUI();

            document.body.addEventListener('pointerdown', () => sound.init(), { once: true });

            // Fix #7: orientation change handler
            window.addEventListener('orientationchange', () => {
                setTimeout(resize3DBoard, 200);
            });

            setTimeout(() => {
                elements.loading.style.opacity = '0';
                setTimeout(() => elements.loading.style.display = 'none', 300);
            }, 500);
        }

        function loadPersistedData() {
            const savedSettings = StorageHandler.loadSettings();
            if (savedSettings) {
                Object.assign(state, savedSettings);
                sound.enabled = state.soundEnabled;
                sound.bgmEnabled = state.bgmEnabled;
            }

            const savedScores = StorageHandler.loadScores();
            if (savedScores) state.scores = savedScores;

            const updateActiveBtn = (selector, key, val) => {
                document.querySelectorAll(selector).forEach(b => {
                    b.classList.toggle('active', b.dataset[key] == val);
                });
            };

            updateActiveBtn('[data-mode]', 'mode', state.mode);
            updateActiveBtn('[data-difficulty]', 'difficulty', state.difficulty);
            updateActiveBtn('[data-grid]', 'grid', state.gridSize);
            updateActiveBtn('[data-board]', 'board', state.boardStyle);
            updateActiveBtn('#p1Symbols .symbol-btn', 'symbol', state.player1Symbol);
            updateActiveBtn('#p2Symbols .symbol-btn', 'symbol', state.player2Symbol);
            updateActiveBtn('[data-theme]', 'theme', state.theme);
            updateActiveBtn('[data-timer]', 'timer', state.timer);

            elements.aiDifficulty.classList.toggle('hidden', state.mode !== 'ai');
            elements.soundToggle.classList.toggle('active', state.soundEnabled);
            elements.bgmToggle.classList.toggle('active', state.bgmEnabled);
            elements.vibrationToggle.classList.toggle('active', state.vibrationEnabled);
            elements.blockedToggle.classList.toggle('active', state.blockedCells);
        }

        function updateScoreUI() {
            elements.p1Score.textContent = state.scores.p1;
            elements.p2Score.textContent = state.scores.p2;
            elements.drawScore.textContent = state.scores.draw;
        }

        function applyTheme(themeName) {
            document.body.className = `theme-${themeName}`;
        }

        function setupEventListeners() {
            // Fix #1: Explicit option button binding
            document.querySelectorAll('[data-mode]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.mode = btn.dataset.mode;
                    elements.aiDifficulty.classList.toggle('hidden', state.mode !== 'ai');
                    StorageHandler.saveSettings(state);
                });
            });

            document.querySelectorAll('[data-difficulty]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('[data-difficulty]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.difficulty = btn.dataset.difficulty;
                    StorageHandler.saveSettings(state);
                });
            });

            document.querySelectorAll('[data-grid]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('[data-grid]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.gridSize = parseInt(btn.dataset.grid);
                    StorageHandler.saveSettings(state);
                });
            });

            document.querySelectorAll('[data-board]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('[data-board]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.boardStyle = btn.dataset.board;
                    StorageHandler.saveSettings(state);
                });
            });

            document.querySelectorAll('#p1Symbols .symbol-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('#p1Symbols .symbol-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.player1Symbol = btn.dataset.symbol;
                    StorageHandler.saveSettings(state);
                });
            });

            document.querySelectorAll('#p2Symbols .symbol-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('#p2Symbols .symbol-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.player2Symbol = btn.dataset.symbol;
                    StorageHandler.saveSettings(state);
                });
            });

            document.querySelectorAll('[data-theme]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('[data-theme]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.theme = btn.dataset.theme;
                    applyTheme(state.theme);
                    StorageHandler.saveSettings(state);
                });
            });

            document.querySelectorAll('[data-timer]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sound.play('click');
                    document.querySelectorAll('[data-timer]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.timer = parseInt(btn.dataset.timer);
                    StorageHandler.saveSettings(state);
                });
            });

            // Toggles
            const setupToggle = (element, stateKey) => {
                element.addEventListener('click', () => {
                    sound.play('click');
                    element.classList.toggle('active');
                    state[stateKey] = element.classList.contains('active');

                    if (stateKey === 'soundEnabled') sound.enabled = state.soundEnabled;
                    if (stateKey === 'bgmEnabled') {
                        sound.bgmEnabled = state.bgmEnabled;
                        if (state.bgmEnabled) sound.startBGM();
                        else sound.stopBGM();
                    }
                    StorageHandler.saveSettings(state);
                });
            };

            setupToggle(elements.soundToggle, 'soundEnabled');
            setupToggle(elements.bgmToggle, 'bgmEnabled');
            setupToggle(elements.vibrationToggle, 'vibrationEnabled');
            setupToggle(elements.blockedToggle, 'blockedCells');

            document.getElementById('playBtn').addEventListener('click', () => {
                sound.init(); sound.play('click'); startGame();
            });

            document.getElementById('backBtn').addEventListener('click', () => {
                sound.play('click'); stopTimer();
                elements.gameScreen.style.display = 'none';
                elements.mainMenu.style.display = 'flex';
                setTimeout(dispose3D, 100);
            });

            elements.undoBtn.addEventListener('click', () => { sound.play('click'); undoMove(); });
            document.getElementById('restartBtn').addEventListener('click', () => { sound.play('click'); resetBoard(); });

            elements.resetScoresBtn.addEventListener('click', () => {
                sound.play('click');
                state.scores = { p1: 0, p2: 0, draw: 0 };
                StorageHandler.saveScores(state.scores);
                updateScoreUI();
            });

            document.getElementById('menuBtn').addEventListener('click', () => {
                sound.play('click'); stopTimer();
                elements.resultModal.style.display = 'none';
                elements.gameScreen.style.display = 'none';
                elements.mainMenu.style.display = 'flex';
                dispose3D();
            });

            document.getElementById('playAgainBtn').addEventListener('click', () => {
                sound.play('click');
                elements.resultModal.style.display = 'none';
                resetBoard();
            });
        }

        function startGame() {
            elements.mainMenu.style.display = 'none';
            elements.gameScreen.style.display = 'flex';

            elements.p1Label.textContent = state.player1Symbol;
            elements.p2Label.textContent = state.mode === 'ai' ? '🤖' : state.player2Symbol;

            if (state.boardStyle === '3d') {
                elements.gameBoard.classList.add('hidden');
                elements.board3D.classList.remove('hidden');

                // Fix #10: Wait for layout before initializing 3D
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        if (!scene) init3DBoard();
                        else resize3DBoard();
                        resetBoard();
                    });
                });
                return;
            } else {
                elements.gameBoard.classList.remove('hidden');
                elements.board3D.classList.add('hidden');
            }

            resetBoard();
        }

        function resetBoard() {
            state.board = Array(state.gridSize * state.gridSize).fill(null);
            state.blocked = []; state.moveHistory = []; state.currentPlayer = 1; state.gameOver = false;
            elements.undoBtn.disabled = true;

            if (state.blockedCells && state.gridSize >= 4) {
                const numBlocked = Math.floor(state.gridSize / 2);
                while (state.blocked.length < numBlocked) {
                    const idx = Math.floor(Math.random() * state.board.length);
                    if (!state.blocked.includes(idx)) state.blocked.push(idx);
                }
            }

            updateSymbolDisplay();

            if (state.boardStyle === '2d') render2DBoard();
            else update3DBoard();

            startTimer();
        }

        function render2DBoard() {
            elements.gameBoard.style.gridTemplateColumns = `repeat(${state.gridSize}, 1fr)`;
            elements.gameBoard.style.gridTemplateRows = `repeat(${state.gridSize}, 1fr)`;
            elements.gameBoard.innerHTML = '';

            state.board.forEach((cell, idx) => {
                const cellEl = document.createElement('div');
                cellEl.className = 'cell';

                const fSize = state.gridSize === 3 ? '3rem' : state.gridSize === 4 ? '2.5rem' : '1.8rem';
                cellEl.style.fontSize = fSize;

                if (state.blocked.includes(idx)) cellEl.classList.add('blocked');
                else if (cell) { cellEl.textContent = cell; cellEl.classList.add('taken'); }

                cellEl.addEventListener('click', () => handleMove(idx));
                elements.gameBoard.appendChild(cellEl);
            });
        }

        function handleMove(idx) {
            if (state.gameOver || state.board[idx] || state.blocked.includes(idx)) return;
            if (state.mode === 'ai' && state.currentPlayer === 2) return;

            makeMove(idx);

            if (!state.gameOver && state.mode === 'ai') {
                setTimeout(() => {
                    if (!state.gameOver) {
                        const aiMove = getAIMove();
                        if (aiMove !== -1) makeMove(aiMove);
                    }
                }, 500);
            }
        }

        function makeMove(idx) {
            const symbol = state.currentPlayer === 1 ? state.player1Symbol : state.player2Symbol;
            state.board[idx] = symbol;
            state.moveHistory.push({ idx, player: state.currentPlayer });

            sound.play('move'); vibrate(50);

            // Fix #5: Correct undo button state
            elements.undoBtn.disabled = state.moveHistory.length === 0 ||
                (state.mode === 'ai' && state.currentPlayer === 2);

            if (state.boardStyle === '2d') {
                const cells = elements.gameBoard.querySelectorAll('.cell');
                cells[idx].textContent = symbol; cells[idx].classList.add('taken', 'pop');
            } else {
                update3DBoard();
            }

            const winResult = checkWin();
            if (winResult) endGame(winResult);
            else if (state.board.every((cell, i) => cell || state.blocked.includes(i))) endGame('draw');
            else {
                state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
                updateSymbolDisplay(); startTimer();
            }
        }

        function getWinLength() {
            if (state.gridSize === 3) return 3;
            if (state.gridSize === 4) return 3;
            if (state.gridSize === 5) return 4;
            return 4;
        }

        function checkWin() {
            const size = state.gridSize; const winLen = getWinLength();
            const lines = [];

            for (let r = 0; r < size; r++) {
                for (let c = 0; c <= size - winLen; c++) {
                    const line = []; for (let i = 0; i < winLen; i++) line.push(r * size + c + i);
                    lines.push(line);
                }
            }
            for (let c = 0; c < size; c++) {
                for (let r = 0; r <= size - winLen; r++) {
                    const line = []; for (let i = 0; i < winLen; i++) line.push((r + i) * size + c);
                    lines.push(line);
                }
            }
            for (let r = 0; r <= size - winLen; r++) {
                for (let c = 0; c <= size - winLen; c++) {
                    const line1 = [], line2 = [];
                    for (let i = 0; i < winLen; i++) {
                        line1.push((r + i) * size + c + i);
                        line2.push((r + i) * size + (c + winLen - 1 - i));
                    }
                    lines.push(line1, line2);
                }
            }

            for (const line of lines) {
                const first = state.board[line[0]];
                if (first && line.every(idx => state.board[idx] === first)) {
                    return { winner: first === state.player1Symbol ? 1 : 2, line };
                }
            }
            return null;
        }

        function endGame(result) {
            state.gameOver = true; stopTimer();

            if (result === 'draw') {
                state.scores.draw++; sound.play('draw');
                elements.resultTitle.textContent = "It's a Draw!";
                elements.winnerSymbol.textContent = '🤝';
                elements.resultText.textContent = 'Nobody wins this round';
            } else {
                const winner = result.winner;
                const symbol = winner === 1 ? state.player1Symbol : state.player2Symbol;

                if (winner === 1) state.scores.p1++; else state.scores.p2++;

                if (state.boardStyle === '2d') {
                    const cells = elements.gameBoard.querySelectorAll('.cell');
                    cells.forEach((cell, idx) => {
                        if (result.line.includes(idx)) {
                            cell.classList.add('winning');
                        } else {
                            cell.classList.add('faded');
                        }
                    });
                } else if (state.boardStyle === '3d') {
                    // Fix #3: Proper 3D win visualization
                    cells3D.forEach((meshObj, index) => {
                        if (!meshObj) return;

                        if (result.line.includes(index)) {
                            const highlightColor = new THREE.Color(0xffff00);
                            if (meshObj.type === 'Group') {
                                meshObj.children.forEach(c => {
                                    c.material.emissive = highlightColor;
                                    c.material.emissiveIntensity = 0.8;
                                });
                            } else {
                                meshObj.material.emissive = highlightColor;
                                meshObj.material.emissiveIntensity = 0.8;
                            }
                        } else {
                            if (meshObj.type === 'Group') {
                                meshObj.children.forEach(c => {
                                    c.material.transparent = true;
                                    c.material.opacity = 0.2;
                                });
                            } else {
                                meshObj.material.transparent = true;
                                meshObj.material.opacity = 0.2;
                            }
                        }
                    });
                }

                if (winner === 1 || state.mode !== 'ai') sound.play('win'); else sound.play('lose');

                vibrate([100, 50, 100, 50, 100]);
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 400);
                if (winner === 1 || state.mode !== 'ai') launchConfetti();

                const winnerName = state.mode === 'ai' && winner === 2 ? 'AI' : `Player ${winner}`;
                elements.resultTitle.textContent = 'Winner!';
                elements.winnerSymbol.textContent = symbol;
                elements.resultText.textContent = `${winnerName} wins!`;
            }

            updateScoreUI();
            StorageHandler.saveScores(state.scores);
            setTimeout(() => elements.resultModal.style.display = 'flex', 1500);
        }

        function undoMove() {
            if (state.moveHistory.length === 0 || state.gameOver) return;

            const movesToUndo = state.mode === 'ai' && state.moveHistory.length >= 2 ? 2 : 1;
            for (let i = 0; i < movesToUndo && state.moveHistory.length > 0; i++) {
                const lastMove = state.moveHistory.pop();
                state.board[lastMove.idx] = null;
            }

            state.currentPlayer = state.moveHistory.length % 2 === 0 ? 1 : 2;

            if (state.boardStyle === '2d') render2DBoard();
            else update3DBoard();

            updateSymbolDisplay();
            elements.undoBtn.disabled = state.moveHistory.length === 0;
            startTimer();
        }

        function updateSymbolDisplay() {
            elements.currentSymbol.textContent = state.currentPlayer === 1 ? state.player1Symbol : state.player2Symbol;
        }

        // Fix #4: Timer doesn't run during AI turn
        function startTimer() {
            stopTimer();
            if (state.timer === 0) {
                elements.timerDisplay.textContent = '--'; elements.timerDisplay.classList.remove('warning'); return;
            }

            // Don't run timer during AI thinking
            if (state.mode === 'ai' && state.currentPlayer === 2) {
                elements.timerDisplay.textContent = '🤖';
                elements.timerDisplay.classList.remove('warning');
                return;
            }

            state.timeLeft = state.timer;
            elements.timerDisplay.textContent = state.timeLeft;
            elements.timerDisplay.classList.remove('warning');

            state.timerInterval = setInterval(() => {
                state.timeLeft--; elements.timerDisplay.textContent = state.timeLeft;

                if (state.timeLeft <= 5) { elements.timerDisplay.classList.add('warning'); sound.play('timer'); }
                if (state.timeLeft <= 0) {
                    stopTimer();
                    state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
                    updateSymbolDisplay(); vibrate(200);
                    document.body.classList.add('shake');
                    setTimeout(() => document.body.classList.remove('shake'), 400);
                    startTimer();

                    if (state.mode === 'ai' && state.currentPlayer === 2) {
                        setTimeout(() => {
                            if (!state.gameOver) {
                                const aiMove = getAIMove();
                                if (aiMove !== -1) makeMove(aiMove);
                            }
                        }, 500);
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
        }

        // AI Logic
        function getAIMove() {
            const avail = state.board.map((c, i) => !c && !state.blocked.includes(i) ? i : null).filter(i => i !== null);
            if (avail.length === 0) return -1;

            if (state.difficulty === 'easy') return avail[Math.floor(Math.random() * avail.length)];
            if (state.difficulty === 'medium') return Math.random() < 0.5 ? avail[Math.floor(Math.random() * avail.length)] : getBestMoveHeuristic(avail);

            if (state.gridSize === 3) return minimax(state.board.slice(), true).index;
            return getBestMoveHeuristic(avail);
        }

        function minimax(board, isMax, alpha = -Infinity, beta = Infinity) {
            const winner = checkWinForBoard(board);
            if (winner === state.player2Symbol) return { score: 10 };
            if (winner === state.player1Symbol) return { score: -10 };
            if (board.every(c => c)) return { score: 0 };

            const moves = [];
            for (let i = 0; i < 9; i++) {
                if (!board[i] && !state.blocked.includes(i)) {
                    const newB = board.slice();
                    newB[i] = isMax ? state.player2Symbol : state.player1Symbol;
                    const res = minimax(newB, !isMax, alpha, beta);
                    moves.push({ index: i, score: res.score });

                    if (isMax) alpha = Math.max(alpha, res.score);
                    else beta = Math.min(beta, res.score);
                    if (beta <= alpha) break;
                }
            }
            if (moves.length === 0) return { score: 0 };
            return isMax ? moves.reduce((a, b) => a.score > b.score ? a : b) : moves.reduce((a, b) => a.score < b.score ? a : b);
        }

        function checkWinForBoard(board) {
            const lines = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];
            for (const [a, b, c] of lines) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
            }
            return null;
        }

        function getBestMoveHeuristic(avail) {
            for (const idx of avail) {
                state.board[idx] = state.player2Symbol;
                if (checkWin()) { state.board[idx] = null; return idx; }
                state.board[idx] = null;
            }
            for (const idx of avail) {
                state.board[idx] = state.player1Symbol;
                if (checkWin()) { state.board[idx] = null; return idx; }
                state.board[idx] = null;
            }
            const center = Math.floor(state.gridSize / 2) * state.gridSize + Math.floor(state.gridSize / 2);
            if (avail.includes(center)) return center;
            return avail[Math.floor(Math.random() * avail.length)];
        }

        // 3D Engine Setup
        function init3DBoard() {
            if (scene) return;

            const container = elements.board3D;
            scene = new THREE.Scene();
            scene.background = null;

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 8, 10); camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dl = new THREE.DirectionalLight(0xffffff, 0.6);
            dl.position.set(5, 10, 7); scene.add(dl);

            setup3DGrid();

            canvasResizeObserver = new ResizeObserver(() => resize3DBoard());
            canvasResizeObserver.observe(container);

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('pointerdown', (e) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                const inters = new THREE.Vector3();
                raycaster.ray.intersectPlane(plane, inters);

                if (inters) {
                    const half = (state.gridSize + 0.5) / 2;
                    const cSize = (state.gridSize + 0.5) / state.gridSize;
                    const col = Math.floor((inters.x + half) / cSize);
                    const row = Math.floor((inters.z + half) / cSize);

                    if (col >= 0 && col < state.gridSize && row >= 0 && row < state.gridSize) {
                        handleMove(row * state.gridSize + col);
                    }
                }
            });

            let rot = 0;
            const animate = () => {
                if (!renderer) return;
                animationFrameId = requestAnimationFrame(animate); // Fix #14
                rot += 0.002;
                camera.position.x = Math.sin(rot) * 9;
                camera.position.z = Math.cos(rot) * 9;
                camera.lookAt(0, 0, 0);
                renderer.render(scene, camera);
            };
            animate();
        }

        // Fix #15: Track and clean up all grid objects
        function setup3DGrid() {
            gridObjects.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
            });
            gridObjects = [];

            if (boardMesh) {
                scene.remove(boardMesh);
                boardMesh.geometry.dispose();
                boardMesh.material.dispose();
            }

            const size = state.gridSize + 0.5;
            boardMesh = new THREE.Mesh(
                new THREE.BoxGeometry(size, 0.2, size),
                new THREE.MeshStandardMaterial({ color: 0x16213e, metalness: 0.2, roughness: 0.8, transparent: true, opacity: 0.8 })
            );
            scene.add(boardMesh);
            gridObjects.push(boardMesh);

            const lm = new THREE.LineBasicMaterial({ color: 0x6c5ce7, linewidth: 2 });
            const cs = size / state.gridSize;
            for (let i = 1; i < state.gridSize; i++) {
                const p = -size / 2 + i * cs;
                const line1 = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(p, 0.11, -size / 2), new THREE.Vector3(p, 0.11, size / 2)]), lm);
                const line2 = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-size / 2, 0.11, p), new THREE.Vector3(size / 2, 0.11, p)]), lm);
                scene.add(line1);
                scene.add(line2);
                gridObjects.push(line1, line2);
            }
        }

        function resize3DBoard() {
            if (!camera || !renderer || !elements.board3D) return;
            const w = elements.board3D.clientWidth; const h = elements.board3D.clientHeight;
            if (w === 0 || h === 0) return;
            renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
        }

        function update3DBoard() {
            if (!scene) return;
            cells3D.forEach(m => {
                if (!m) return;
                scene.remove(m);
                if (m.type === 'Group') m.children.forEach(c => { c.geometry.dispose(); c.material.dispose(); });
                else { m.geometry.dispose(); m.material.dispose(); }
            });
            cells3D = [];

            const s = state.gridSize + 0.5; const cs = s / state.gridSize; const hf = s / 2;

            state.board.forEach((cell, idx) => {
                const r = Math.floor(idx / state.gridSize); const c = idx % state.gridSize;
                const x = -hf + c * cs + cs / 2; const z = -hf + r * cs + cs / 2;

                if (state.blocked.includes(idx)) {
                    const bm = new THREE.Mesh(new THREE.BoxGeometry(cs * 0.8, 0.3, cs * 0.8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                    bm.position.set(x, 0.25, z); scene.add(bm); cells3D.push(bm);
                } else if (cell) {
                    const isP1 = cell === state.player1Symbol;
                    const color = isP1 ? 0xe94560 : 0x00d9ff;
                    let m;

                    if (cell === '⭕' || cell === state.player2Symbol) {
                        m = new THREE.Mesh(new THREE.TorusGeometry(cs * 0.3, 0.08, 16, 32), new THREE.MeshStandardMaterial({ color }));
                        m.rotation.x = -Math.PI / 2;
                    } else {
                        m = new THREE.Group();
                        const bGeo = new THREE.BoxGeometry(cs * 0.6, 0.15, 0.1); const bMat = new THREE.MeshStandardMaterial({ color });
                        const b1 = new THREE.Mesh(bGeo, bMat.clone()); b1.rotation.y = Math.PI / 4; m.add(b1);
                        const b2 = new THREE.Mesh(bGeo, bMat.clone()); b2.rotation.y = -Math.PI / 4; m.add(b2);
                    }
                    m.position.set(x, 0.3, z); scene.add(m); cells3D.push(m);
                } else {
                    cells3D.push(null);
                }
            });
        }

        // Fix #14: Cancel animation frame on dispose
        function dispose3D() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (canvasResizeObserver && elements.board3D) canvasResizeObserver.disconnect();
            if (renderer) {
                // Clean up all 3D objects
                cells3D.forEach(m => {
                    if (!m) return;
                    scene.remove(m);
                    if (m.type === 'Group') m.children.forEach(c => { c.geometry.dispose(); c.material.dispose(); });
                    else { m.geometry.dispose(); m.material.dispose(); }
                });
                cells3D = [];

                gridObjects.forEach(obj => {
                    scene.remove(obj);
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) obj.material.dispose();
                });
                gridObjects = [];
                boardMesh = null;

                renderer.dispose();
                if (renderer.domElement && renderer.domElement.parentNode) {
                    renderer.domElement.parentNode.removeChild(renderer.domElement);
                }
                renderer = null; scene = null; camera = null;
            }
        }

        // Utils
        function vibrate(p) { if (state.vibrationEnabled && navigator.vibrate) navigator.vibrate(p); }
        function launchConfetti() {
            const end = Date.now() + 2000; const c = ['#e94560', '#6c5ce7', '#00d9ff', '#ffd93d'];
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: c, zIndex: 1500 });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: c, zIndex: 1500 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
